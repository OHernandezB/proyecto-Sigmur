spring.application.name=Auth
# Servidor
server.port=8081
 
# Base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/sigmur
spring.datasource.username=postgres
spring.datasource.password=tu_password
spring.datasource.driver-class-name=org.postgresql.Driver
 
# JPA - NO recrear tablas, ya existen
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
# JWT
jwt.secret=sigmur_secret_key_muy_larga_para_ser_segura_2024_min256bits
jwt.expiration=86400000
 
# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
 
# Nombre de la app en Eureka
eureka.instance.appname=auth-service
